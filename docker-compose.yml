services:

  # ─── ZOOKEEPER ───────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - cordillera-net

  # ─── KAFKA ───────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-cordillera
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - cordillera-net

  # ─── MYSQL PARA MS-LOGIN ─────────────────────────────────────────────────────
  mysql-login:
    image: mysql:8.0
    container_name: mysql-login
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: db_login
    ports:
      - "3307:3306"
    volumes:
      - mysql-login-data:/var/lib/mysql
      - ./sql/db_login.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s
    networks:
      - cordillera-net

  # ─── MYSQL PARA MS-DATA ──────────────────────────────────────────────────────
  mysql-data:
    image: mysql:8.0
    container_name: mysql-data
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: db_data
    ports:
      - "3308:3306"
    volumes:
      - mysql-data-vol:/var/lib/mysql
      - ./sql/db_data.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s
    networks:
      - cordillera-net

  # ─── MYSQL PARA MS-KPI ───────────────────────────────────────────────────────
  mysql-kpi:
    image: mysql:8.0
    container_name: mysql-kpi
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: db_kpi
    ports:
      - "3309:3306"
    volumes:
      - mysql-kpi-data:/var/lib/mysql
      - ./sql/db_kpi.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s
    networks:
      - cordillera-net

  # ─── MYSQL PARA MS-REPORTES ──────────────────────────────────────────────────
  mysql-reportes:
    image: mysql:8.0
    container_name: mysql-reportes
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: db_reportes
    ports:
      - "3310:3306"
    volumes:
      - mysql-reportes-data:/var/lib/mysql
      - ./sql/db_reportes.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s
    networks:
      - cordillera-net

  # ─── MS-LOGIN ────────────────────────────────────────────────────────────────
  ms-login:
    build:
      context: ./MS-login
      dockerfile: Dockerfile
    container_name: ms-login
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-login:3306/db_login?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: cordillera-grupo-jwt-secret-key-2026
      JWT_EXPIRATION: 86400000
    depends_on:
      mysql-login:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - cordillera-net

  # ─── MS-DATA ─────────────────────────────────────────────────────────────────
  ms-data:
    build:
      context: ./MS-data
      dockerfile: Dockerfile
    container_name: ms-data
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-data:3306/db_data?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      mysql-data:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - cordillera-net

  # ─── MS-KPI ──────────────────────────────────────────────────────────────────
  ms-kpi:
    build:
      context: ./MS-kpi
      dockerfile: Dockerfile
    container_name: ms-kpi
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-kpi:3306/db_kpi?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      FEIGN_DATA_URL: http://ms-data:8082
    depends_on:
      mysql-kpi:
        condition: service_healthy
      kafka:
        condition: service_healthy
      ms-data:
        condition: service_started
    networks:
      - cordillera-net

  # ─── MS-REPORTES ─────────────────────────────────────────────────────────────
  ms-reportes:
    build:
      context: ./MS-reportes
      dockerfile: Dockerfile
    container_name: ms-reportes
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-reportes:3306/db_reportes?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      FEIGN_KPI_URL: http://ms-kpi:8083
      FEIGN_DATA_URL: http://ms-data:8082
    depends_on:
      mysql-reportes:
        condition: service_healthy
      kafka:
        condition: service_healthy
      ms-kpi:
        condition: service_started
    networks:
      - cordillera-net

  # ─── API-GATEWAY ─────────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: cordillera-grupo-jwt-secret-key-2026
      MS_LOGIN_URL: http://ms-login:8081
      MS_DATA_URL: http://ms-data:8082
      MS_KPI_URL: http://ms-kpi:8083
      MS_REPORTES_URL: http://ms-reportes:8084
    depends_on:
      - ms-login
      - ms-data
      - ms-kpi
      - ms-reportes
    networks:
      - cordillera-net

  # ─── FRONTEND ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - cordillera-net

volumes:
  mysql-login-data:
  mysql-data-vol:
  mysql-kpi-data:
  mysql-reportes-data:

networks:
  cordillera-net:
    driver: bridge
