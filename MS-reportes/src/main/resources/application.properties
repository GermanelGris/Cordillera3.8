spring.application.name=ms-reportes
server.port=8084

# Datasource
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3310/db_reportes?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Kafka
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.group-id=reportes-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# OpenFeign + Circuit Breaker
feign.client.kpi.url=${FEIGN_KPI_URL:http://localhost:8083}
feign.client.data.url=${FEIGN_DATA_URL:http://localhost:8082}
feign.circuitbreaker.enabled=true

# Resilience4j Circuit Breaker
resilience4j.circuitbreaker.instances.kpi-service.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.kpi-service.slidingWindowSize=10
resilience4j.circuitbreaker.instances.kpi-service.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.kpi-service.waitDurationInOpenState=5s
resilience4j.circuitbreaker.instances.kpi-service.failureRateThreshold=50
resilience4j.circuitbreaker.instances.datos-service.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.datos-service.slidingWindowSize=10
resilience4j.circuitbreaker.instances.datos-service.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.datos-service.waitDurationInOpenState=5s
resilience4j.circuitbreaker.instances.datos-service.failureRateThreshold=50

# Actuator
management.endpoints.web.exposure.include=health,info,circuitbreakers
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true
