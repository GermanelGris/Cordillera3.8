services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper-login
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - login-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-login
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - login-net

  mysql-login:
    image: mysql:8.0
    container_name: mysql-login-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: db_login
    ports:
      - "3307:3306"
    volumes:
      - mysql-login-dev:/var/lib/mysql
      - ./sql/db_login.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - login-net

  ms-login:
    build:
      context: ./MS-login
      dockerfile: Dockerfile
    container_name: ms-login-dev
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-login:3306/db_login?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: cordillera-grupo-jwt-secret-key-2026
      JWT_EXPIRATION: 86400000
    depends_on:
      mysql-login:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - login-net

volumes:
  mysql-login-dev:

networks:
  login-net:
    driver: bridge
